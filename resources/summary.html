<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/katex.min.css">
<script src="js/marked.min.js"></script>
<script src="js/highlight.min.js"></script>
<script src="js/katex.min.js"></script>
<style>
/* ── Reset & Base ──────────────────────────────────────────── */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0d0f14;
  color: #e2e8f0;
  font-family: "Pretendard","Malgun Gothic","Apple SD Gothic Neo","Noto Sans CJK KR",sans-serif;
  font-size: 13px;
  padding: 12px;
  overflow-x: hidden;
}

/* ── Scrollbar ─────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0d0f14; }
::-webkit-scrollbar-thumb { background: #2a3045; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #64748b; }

/* ── Summary Card ─────────────────────────────────────────── */
.summary-card {
  background: #111827;
  border: 1px solid #2a3045;
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 12px;
}
.card-header {
  font-size: 13px;
  font-weight: 700;
  color: #e2e8f0;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid #2a3045;
}
.card-body {
  line-height: 1.7;
}

/* ── Markdown content (chat.html과 동일) ──────────────────── */
.card-body p { margin: 0.4em 0; }
.card-body pre {
  position: relative;
  background: #0a0e17;
  border-left: 3px solid #f97316;
  border-radius: 0 4px 4px 0;
  padding: 8px;
  overflow-x: auto;
  font-size: 11px;
  line-height: 1.5;
  margin: 0.5em 0;
}
.copy-btn {
  position: absolute;
  top: 4px;
  right: 4px;
  background: #2a3045;
  color: #94a3b8;
  border: 1px solid #3a4055;
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 11px;
  font-family: "Pretendard","Malgun Gothic",sans-serif;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 1;
}
.card-body pre:hover .copy-btn { opacity: 1; }
.copy-btn:hover { background: #3a4055; color: #e2e8f0; }
.copy-btn.copied { color: #4ade80; border-color: #4ade80; }
.card-body pre code {
  background: none;
  color: inherit;
  padding: 0;
  border-radius: 0;
  font-size: 11px;
}
.card-body code {
  font-family: "JetBrains Mono",Consolas,monospace;
}
.card-body :not(pre) > code {
  background: #0d1117;
  color: #f97316;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
}
.card-body table { border-collapse: collapse; margin: 0.5em 0; width: 100%; }
.card-body th, .card-body td {
  border: 1px solid #2a3045;
  padding: 4px 8px;
  font-size: 12px;
  text-align: left;
}
.card-body th { background: #1e2330; color: #94a3b8; font-weight: 600; }
.card-body h1, .card-body h2, .card-body h3, .card-body h4, .card-body h5, .card-body h6 {
  color: #60a5fa;
  margin: 0.6em 0 0.3em;
}
.card-body h1 { font-size: 1.3em; }
.card-body h2 { font-size: 1.15em; }
.card-body h3 { font-size: 1.05em; }
.card-body ul, .card-body ol { padding-left: 1.5em; margin: 0.3em 0; }
.card-body li { margin: 0.15em 0; }
.card-body hr { border: none; border-top: 1px solid #2a3045; margin: 0.6em 0; }
.card-body blockquote {
  border-left: 3px solid #a78bfa;
  padding-left: 10px;
  color: #94a3b8;
  margin: 0.4em 0;
}
.card-body a { color: #60a5fa; text-decoration: none; }
.card-body a:hover { text-decoration: underline; }
.card-body strong { color: #f1f5f9; }
.card-body img { max-width: 100%; border-radius: 4px; }

/* ── Highlight.js dark theme (Atom One Dark inspired) ──────── */
.hljs { color: #abb2bf; }
.hljs-keyword, .hljs-selector-tag, .hljs-literal, .hljs-section, .hljs-link { color: #c678dd; }
.hljs-function .hljs-keyword { color: #c678dd; }
.hljs-string, .hljs-addition { color: #98c379; }
.hljs-number, .hljs-attr { color: #d19a66; }
.hljs-comment, .hljs-quote, .hljs-deletion { color: #5c6370; font-style: italic; }
.hljs-title, .hljs-title.function_ { color: #61afef; }
.hljs-built_in, .hljs-type { color: #e5c07b; }
.hljs-variable, .hljs-template-variable { color: #e06c75; }
.hljs-name, .hljs-selector-id, .hljs-selector-class { color: #e06c75; }
.hljs-meta { color: #61afef; }
.hljs-params { color: #abb2bf; }
.hljs-subst { color: #e06c75; }
.hljs-regexp { color: #98c379; }
.hljs-symbol { color: #56b6c2; }
.hljs-doctag { color: #c678dd; }

/* ── KaTeX 다크 테마 ───────────────────────────────────────── */
.katex { color: #e2e8f0; font-size: 1.1em; }
.katex-display { margin: 0.6em 0; overflow-x: auto; }

/* ── Placeholder ──────────────────────────────────────────── */
.placeholder {
  color: #64748b;
  font-size: 12px;
  text-align: center;
  padding: 40px 20px;
}
</style>
</head>
<body>
<div id="cards-container"></div>

<script>
// ── KaTeX 수학 확장 (marked.js 플러그인) ─────────────────────
function _katexRender(text, displayMode) {
  if (!window.katex) return null;
  try { return katex.renderToString(text, { displayMode: displayMode, throwOnError: false }); }
  catch(e) { return null; }
}

const mathExtension = {
  extensions: [
    {
      name: 'displayMath',
      level: 'block',
      start(src) { return src.indexOf('$$'); },
      tokenizer(src) {
        const m = src.match(/^\$\$([\s\S]*?)\$\$/);
        if (m) return { type: 'displayMath', raw: m[0], text: m[1].trim() };
      },
      renderer(token) {
        return _katexRender(token.text, true) || '<span>' + token.raw + '</span>';
      }
    },
    {
      name: 'displayMathBracket',
      level: 'block',
      start(src) { return src.indexOf('\\['); },
      tokenizer(src) {
        const m = src.match(/^\\\[([\s\S]*?)\\\]/);
        if (m) return { type: 'displayMathBracket', raw: m[0], text: m[1].trim() };
      },
      renderer(token) {
        return _katexRender(token.text, true) || '<span>' + token.raw + '</span>';
      }
    },
    {
      name: 'inlineMath',
      level: 'inline',
      start(src) { return src.indexOf('$'); },
      tokenizer(src) {
        const m = src.match(/^\$((?:[^$\\\n]|\\.)+?)\$/);
        if (m) return { type: 'inlineMath', raw: m[0], text: m[1].trim() };
      },
      renderer(token) {
        return _katexRender(token.text, false) || '<span>' + token.raw + '</span>';
      }
    },
    {
      name: 'inlineMathParen',
      level: 'inline',
      start(src) { return src.indexOf('\\('); },
      tokenizer(src) {
        const m = src.match(/^\\\(((?:[^\\]|\\.)*?)\\\)/);
        if (m) return { type: 'inlineMathParen', raw: m[0], text: m[1].trim() };
      },
      renderer(token) {
        return _katexRender(token.text, false) || '<span>' + token.raw + '</span>';
      }
    }
  ]
};
marked.use(mathExtension);

// ── marked.js 설정 ────────────────────────────────────────────
marked.setOptions({
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      try { return hljs.highlight(code, { language: lang }).value; }
      catch(e) {}
    }
    try { return hljs.highlightAuto(code).value; }
    catch(e) {}
    return code;
  },
  breaks: true,
  gfm: true
});

var container = document.getElementById('cards-container');

// ── 코드 복사 버튼 ──────────────────────────────────────────────
function copyViaConsole(text) {
  console.log("__COPY__:" + text);
}

function addCopyButtons(root) {
  root.querySelectorAll('pre > code').forEach(function(codeEl) {
    var pre = codeEl.parentElement;
    if (pre.querySelector('.copy-btn')) return;
    var btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = '\uBCF5\uC0AC';
    btn.addEventListener('click', function() {
      copyViaConsole(codeEl.textContent);
      btn.textContent = '\u2713 \uBCF5\uC0AC\uB428';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = '\uBCF5\uC0AC';
        btn.classList.remove('copied');
      }, 1500);
    });
    pre.appendChild(btn);
  });
}

// ── Public API (Python에서 runJavaScript로 호출) ──────────────

function addSummaryCard(nbName, markdown) {
  // placeholder 제거
  var ph = container.querySelector('.placeholder');
  if (ph) ph.remove();

  var card = document.createElement('div');
  card.className = 'summary-card';

  var header = document.createElement('div');
  header.className = 'card-header';
  header.textContent = '\uD83D\uDCD3 ' + nbName;
  card.appendChild(header);

  var body = document.createElement('div');
  body.className = 'card-body';
  body.innerHTML = marked.parse(markdown);
  body.querySelectorAll('pre code:not(.hljs)').forEach(function(el) {
    hljs.highlightElement(el);
  });
  addCopyButtons(body);
  card.appendChild(body);

  container.appendChild(card);
}

function clearCards() {
  container.innerHTML = '';
}

function showPlaceholder(msg) {
  container.innerHTML = '<div class="placeholder">' + msg + '</div>';
}

function setFontSize(px) {
  document.body.style.fontSize = px + 'px';
}
</script>
</body>
</html>
