<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/katex.min.css">
<script src="js/marked.min.js"></script>
<script src="js/highlight.min.js"></script>
<script src="js/katex.min.js"></script>
<style>
/* ── Reset & Base ──────────────────────────────────────────── */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0d0f14;
  color: #e2e8f0;
  font-family: "Pretendard","Malgun Gothic","Apple SD Gothic Neo","Noto Sans CJK KR",sans-serif;
  font-size: 13px;
  padding: 8px;
  overflow-x: hidden;
}

/* ── Scrollbar ─────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0d0f14; }
::-webkit-scrollbar-thumb { background: #2a3045; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #64748b; }

/* ── Message layout ────────────────────────────────────────── */
.msg { margin: 6px 0; display: flex; }
.msg-user { justify-content: flex-end; }
.msg-ai   { justify-content: flex-start; }

.bubble {
  max-width: 85%;
  padding: 10px 14px;
  line-height: 1.6;
  word-break: break-word;
}
.bubble-user {
  background: linear-gradient(135deg, #1e3a5f, #1e2a4a);
  border: 1px solid #1d4ed8;
  border-radius: 12px 12px 4px 12px;
  text-align: right;
  position: relative;
}
.bubble-ai {
  background: #1e2330;
  border: 1px solid #2a3045;
  border-radius: 4px 12px 12px 12px;
}

.msg-label {
  font-size: 10px;
  color: #94a3b8;
  margin-bottom: 4px;
  font-family: "JetBrains Mono",Consolas,monospace;
}
.msg-user .msg-label { text-align: right; }

/* ── Context banner ───────────────────────────────────────── */
.context-banner {
  background: #1a1f2e;
  border: 1px solid #2a3045;
  border-radius: 6px;
  padding: 5px 10px;
  margin: 4px 0;
  font-size: 11px;
  color: #94a3b8;
  display: flex;
  align-items: center;
  gap: 6px;
}
.context-banner .ctx-icon { color: #60a5fa; }

/* ── Status banner ────────────────────────────────────────── */
.status-banner {
  background: #1a1f2e;
  border: 1px solid #2a3045;
  border-radius: 6px;
  padding: 8px 12px;
  margin: 6px 0;
  font-size: 12px;
  color: #94a3b8;
  text-align: center;
}

/* ── Markdown content ──────────────────────────────────────── */
.content p { margin: 0.4em 0; }
.content pre {
  position: relative;
  background: #111827;
  border-left: 3px solid #f97316;
  border-radius: 0 4px 4px 0;
  padding: 8px;
  overflow-x: auto;
  font-size: 11px;
  line-height: 1.5;
  margin: 0.5em 0;
}
.copy-btn {
  position: absolute;
  top: 4px; right: 4px;
  background: #2a3045; color: #94a3b8;
  border: 1px solid #3a4055; border-radius: 4px;
  padding: 2px 8px; font-size: 11px;
  font-family: "Pretendard","Malgun Gothic",sans-serif;
  cursor: pointer; opacity: 0; transition: opacity 0.15s; z-index: 1;
}
.content pre:hover .copy-btn { opacity: 1; }
.copy-btn:hover { background: #3a4055; color: #e2e8f0; }
.copy-btn.copied { color: #4ade80; border-color: #4ade80; }
.content pre code {
  background: none; color: inherit; padding: 0; border-radius: 0; font-size: 11px;
}
.content code { font-family: "JetBrains Mono",Consolas,monospace; }
.content :not(pre) > code {
  background: #0d1117; color: #f97316; padding: 1px 4px; border-radius: 3px; font-size: 12px;
}
.content table { border-collapse: collapse; margin: 0.5em 0; width: 100%; }
.content th, .content td {
  border: 1px solid #2a3045; padding: 4px 8px; font-size: 12px; text-align: left;
}
.content th { background: #1e2330; color: #94a3b8; font-weight: 600; }
.content h1,.content h2,.content h3,.content h4,.content h5,.content h6 {
  color: #60a5fa; margin: 0.6em 0 0.3em;
}
.content h1 { font-size: 1.3em; }
.content h2 { font-size: 1.15em; }
.content h3 { font-size: 1.05em; }
.content ul,.content ol { padding-left: 1.5em; margin: 0.3em 0; }
.content li { margin: 0.15em 0; }
.content hr { border: none; border-top: 1px solid #2a3045; margin: 0.6em 0; }
.content blockquote {
  border-left: 3px solid #a78bfa; padding-left: 10px; color: #94a3b8; margin: 0.4em 0;
}
.content a { color: #60a5fa; text-decoration: none; }
.content a:hover { text-decoration: underline; }
.content strong { color: #f1f5f9; }
.content img { max-width: 100%; border-radius: 4px; }

/* ── Highlight.js dark theme ──────────────────────────────── */
.hljs { color: #abb2bf; }
.hljs-keyword,.hljs-selector-tag,.hljs-literal,.hljs-section,.hljs-link { color: #c678dd; }
.hljs-function .hljs-keyword { color: #c678dd; }
.hljs-string,.hljs-addition { color: #98c379; }
.hljs-number,.hljs-attr { color: #d19a66; }
.hljs-comment,.hljs-quote,.hljs-deletion { color: #5c6370; font-style: italic; }
.hljs-title,.hljs-title.function_ { color: #61afef; }
.hljs-built_in,.hljs-type { color: #e5c07b; }
.hljs-variable,.hljs-template-variable { color: #e06c75; }
.hljs-name,.hljs-selector-id,.hljs-selector-class { color: #e06c75; }
.hljs-meta { color: #61afef; }
.hljs-params { color: #abb2bf; }
.hljs-subst { color: #e06c75; }
.hljs-regexp { color: #98c379; }
.hljs-symbol { color: #56b6c2; }
.hljs-doctag { color: #c678dd; }

/* ── KaTeX ────────────────────────────────────────────────── */
.katex { color: #e2e8f0; font-size: 1.1em; }
.katex-display { margin: 0.6em 0; overflow-x: auto; }

/* ── Action buttons ───────────────────────────────────────── */
.msg-actions {
  float: right; display: flex; gap: 4px; margin-left: 8px;
}
.action-btn {
  background: #2a3045; color: #94a3b8;
  border: 1px solid #3a4055; border-radius: 4px;
  padding: 2px 7px; font-size: 10px;
  font-family: "Pretendard","Malgun Gothic",sans-serif;
  cursor: pointer; line-height: 1.6;
}
.action-btn:hover { background: #3a4055; color: #e2e8f0; }
.action-btn.copied { color: #4ade80; border-color: #4ade80; }

/* ── Streaming cursor ─────────────────────────────────────── */
.cursor {
  display: inline-block; width: 2px; height: 1em;
  background: #4f8ef7; margin-left: 2px; vertical-align: text-bottom;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* ── Placeholder ──────────────────────────────────────────── */
.placeholder {
  color: #64748b; font-size: 12px; text-align: center; padding: 40px 20px;
  line-height: 1.8;
}
</style>
</head>
<body>
<div id="chat-container">
  <div class="placeholder">
    \uc85c\uce21\uc5d0\uc11c \uc140\uc744 \uc120\ud0dd\ud55c \ud6c4<br>
    \uc9c8\ubb38\uc744 \uc785\ub825\ud558\uc138\uc694.
  </div>
</div>

<script>
// ── KaTeX math extension ─────────────────────────────────────
function _katexRender(text, displayMode) {
  if (!window.katex) return null;
  try { return katex.renderToString(text, { displayMode: displayMode, throwOnError: false }); }
  catch(e) { return null; }
}
var mathExtension = {
  extensions: [
    { name:'displayMath', level:'block',
      start(src){return src.indexOf('$$');},
      tokenizer(src){var m=src.match(/^\$\$([\s\S]*?)\$\$/);if(m)return{type:'displayMath',raw:m[0],text:m[1].trim()};},
      renderer(token){return _katexRender(token.text,true)||'<span>'+token.raw+'</span>';}
    },
    { name:'displayMathBracket', level:'block',
      start(src){return src.indexOf('\\[');},
      tokenizer(src){var m=src.match(/^\\\[([\s\S]*?)\\\]/);if(m)return{type:'displayMathBracket',raw:m[0],text:m[1].trim()};},
      renderer(token){return _katexRender(token.text,true)||'<span>'+token.raw+'</span>';}
    },
    { name:'inlineMath', level:'inline',
      start(src){return src.indexOf('$');},
      tokenizer(src){var m=src.match(/^\$((?:[^$\\\n]|\\.)+?)\$/);if(m)return{type:'inlineMath',raw:m[0],text:m[1].trim()};},
      renderer(token){return _katexRender(token.text,false)||'<span>'+token.raw+'</span>';}
    },
    { name:'inlineMathParen', level:'inline',
      start(src){return src.indexOf('\\(');},
      tokenizer(src){var m=src.match(/^\\\(((?:[^\\]|\\.)*?)\\\)/);if(m)return{type:'inlineMathParen',raw:m[0],text:m[1].trim()};},
      renderer(token){return _katexRender(token.text,false)||'<span>'+token.raw+'</span>';}
    }
  ]
};
marked.use(mathExtension);

marked.setOptions({
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      try { return hljs.highlight(code, { language: lang }).value; } catch(e) {}
    }
    try { return hljs.highlightAuto(code).value; } catch(e) {}
    return code;
  },
  breaks: true, gfm: true
});

var container = document.getElementById('chat-container');
var currentAiBubble = null;
var streamingBuffer = '';

function escapeHtml(text) {
  var div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function isNearBottom(threshold) {
  threshold = threshold || 50;
  return (window.innerHeight + window.scrollY) >= (document.body.scrollHeight - threshold);
}

function scrollToBottom(force) {
  if (force || isNearBottom()) {
    window.scrollTo(0, document.body.scrollHeight);
  }
}

function copyViaConsole(text) {
  console.log("__COPY__:" + text);
}

function addCopyButtons(root) {
  root.querySelectorAll('pre > code').forEach(function(codeEl) {
    var pre = codeEl.parentElement;
    if (pre.querySelector('.copy-btn')) return;
    var btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = '\ubcf5\uc0ac';
    btn.addEventListener('click', function() {
      copyViaConsole(codeEl.textContent);
      btn.textContent = '\u2713 \ubcf5\uc0ac\ub428';
      btn.classList.add('copied');
      setTimeout(function(){ btn.textContent='\ubcf5\uc0ac'; btn.classList.remove('copied'); }, 1500);
    });
    pre.appendChild(btn);
  });
}

function addMsgActions(bubbleDiv, rawMarkdown) {
  var label = bubbleDiv.querySelector('.msg-label');
  if (!label || label.querySelector('.msg-actions')) return;
  var actions = document.createElement('div');
  actions.className = 'msg-actions';

  var mdBtn = document.createElement('button');
  mdBtn.className = 'action-btn';
  mdBtn.textContent = 'MD';
  mdBtn.addEventListener('click', function() {
    copyViaConsole(rawMarkdown);
    mdBtn.textContent = '\u2713';
    mdBtn.classList.add('copied');
    setTimeout(function(){ mdBtn.textContent='MD'; mdBtn.classList.remove('copied'); }, 1500);
  });

  var txtBtn = document.createElement('button');
  txtBtn.className = 'action-btn';
  txtBtn.textContent = 'Text';
  txtBtn.addEventListener('click', function() {
    var c = bubbleDiv.querySelector('.content');
    copyViaConsole(c ? c.innerText : '');
    txtBtn.textContent = '\u2713';
    txtBtn.classList.add('copied');
    setTimeout(function(){ txtBtn.textContent='Text'; txtBtn.classList.remove('copied'); }, 1500);
  });

  actions.appendChild(mdBtn);
  actions.appendChild(txtBtn);
  label.appendChild(actions);
}

// ── Public API ───────────────────────────────────────────────

function showSelectedContext(cellsInfo) {
  // Remove placeholder
  var ph = container.querySelector('.placeholder');
  if (ph) ph.remove();

  var banner = document.createElement('div');
  banner.className = 'context-banner';
  banner.innerHTML = '<span class="ctx-icon">\ud83d\udcce</span> ' + escapeHtml(cellsInfo);
  container.appendChild(banner);
  scrollToBottom(true);
}

function showStatus(msg) {
  var existing = container.querySelector('.status-banner');
  if (existing) existing.remove();
  var banner = document.createElement('div');
  banner.className = 'status-banner';
  banner.textContent = msg;
  container.appendChild(banner);
  scrollToBottom(true);
}

function removeStatus() {
  var existing = container.querySelector('.status-banner');
  if (existing) existing.remove();
}

function appendUserMessage(text) {
  var ph = container.querySelector('.placeholder');
  if (ph) ph.remove();

  var msg = document.createElement('div');
  msg.className = 'msg msg-user';
  msg.innerHTML =
    '<div class="bubble bubble-user">' +
      '<div class="msg-label">\ud83d\udc64 \uc0ac\uc6a9\uc790</div>' +
      '<div class="content">' + escapeHtml(text) + '</div>' +
    '</div>';
  container.appendChild(msg);
  scrollToBottom(true);
}

function startAiMessage() {
  streamingBuffer = '';
  removeStatus();
  var msg = document.createElement('div');
  msg.className = 'msg msg-ai';
  msg.innerHTML =
    '<div class="bubble bubble-ai">' +
      '<div class="msg-label">\ud83e\udd16 AI \ud29c\ud130</div>' +
      '<div class="content" id="streaming-content"><span class="cursor"></span></div>' +
    '</div>';
  container.appendChild(msg);
  currentAiBubble = document.getElementById('streaming-content');
  scrollToBottom(true);
}

function renderStreamingBuffer() {
  if (!currentAiBubble) return;
  currentAiBubble.innerHTML = marked.parse(streamingBuffer) + '<span class="cursor"></span>';
  currentAiBubble.querySelectorAll('pre code:not(.hljs)').forEach(function(el) {
    hljs.highlightElement(el);
  });
  addCopyButtons(currentAiBubble);
  scrollToBottom();
}

function finishAiMessage() {
  if (!currentAiBubble) return;
  var rawMd = streamingBuffer;
  var bubbleDiv = currentAiBubble.closest('.bubble-ai');
  currentAiBubble.innerHTML = marked.parse(rawMd);
  currentAiBubble.querySelectorAll('pre code:not(.hljs)').forEach(function(el) {
    hljs.highlightElement(el);
  });
  addCopyButtons(currentAiBubble);
  if (bubbleDiv) addMsgActions(bubbleDiv, rawMd);
  currentAiBubble.removeAttribute('id');
  currentAiBubble = null;
  streamingBuffer = '';
  scrollToBottom();
}

function appendFinishedAiMessage(text) {
  var msg = document.createElement('div');
  msg.className = 'msg msg-ai';
  msg.innerHTML =
    '<div class="bubble bubble-ai">' +
      '<div class="msg-label">\ud83e\udd16 AI \ud29c\ud130</div>' +
      '<div class="content">' + marked.parse(text) + '</div>' +
    '</div>';
  container.appendChild(msg);
  msg.querySelectorAll('pre code:not(.hljs)').forEach(function(el) {
    hljs.highlightElement(el);
  });
  addCopyButtons(msg);
  var bubbleDiv = msg.querySelector('.bubble-ai');
  if (bubbleDiv) addMsgActions(bubbleDiv, text);
  scrollToBottom(true);
}

function clearChat() {
  container.innerHTML =
    '<div class="placeholder">' +
    '\uc85c\uce21\uc5d0\uc11c \uc140\uc744 \uc120\ud0dd\ud55c \ud6c4<br>\uc9c8\ubb38\uc744 \uc785\ub825\ud558\uc138\uc694.' +
    '</div>';
  currentAiBubble = null;
  streamingBuffer = '';
}

function setFontSize(px) {
  document.body.style.fontSize = px + 'px';
}
</script>
</body>
</html>
